<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analizador de Landing Pages · Ecuador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text: #1a1a18;
      --muted: #6b6860;
      --hint: #a8a49e;
      --green: #1a7a4a;
      --green-bg: #d4f0e2;
      --amber: #8a5c00;
      --amber-bg: #fef3d0;
      --red: #c0392b;
      --accent: #1a1a18;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container { max-width: 640px; margin: 0 auto; }

    header { margin-bottom: 2.5rem; }
    header h1 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }
    header p { font-size: 12px; color: var(--muted); }

    .input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .url-input {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: var(--text); }
    .url-input::placeholder { color: var(--hint); }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .status {
      font-size: 12px;
      color: var(--muted);
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .status.error { color: var(--red); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .report { display: none; }
    .report.visible { display: block; }

    .score-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 10px;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .score-big {
      font-family: 'Fraunces', serif;
      font-size: 60px;
      font-weight: 600;
      line-height: 1;
      flex-shrink: 0;
    }
    .score-big.strong { color: var(--green); }
    .score-big.valid { color: var(--amber); }
    .score-big.weak { color: var(--hint); }
    .score-meta { flex: 1; min-width: 0; }
    .score-url { font-size: 11px; color: var(--hint); margin-bottom: 6px; word-break: break-all; }
    .verdict-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .verdict-badge.strong { background: var(--green-bg); color: var(--green); }
    .verdict-badge.valid { background: var(--amber-bg); color: var(--amber); }
    .verdict-badge.weak { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .bar-wrap { height: 4px; background: var(--border); border-radius: 2px; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.7s ease; }
    .bar-fill.strong { background: var(--green); }
    .bar-fill.valid { background: #d4960a; }
    .bar-fill.weak { background: var(--hint); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 1rem;
    }

    .cr-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .cr-row:last-child { border-bottom: none; padding-bottom: 0; }
    .cr-icon { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
    .cr-text { flex: 1; line-height: 1.5; }
    .cr-pts { flex-shrink: 0; color: var(--hint); font-size: 11px; margin-top: 2px; }

    .issue-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; line-height: 1.5; }
    .issue-row:last-child { border-bottom: none; }
    .issue-dot { width: 4px; height: 4px; border-radius: 50%; background: #d4960a; flex-shrink: 0; margin-top: 6px; }

    .pitch-row { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; line-height: 1.6; }
    .pitch-row:last-child { border-bottom: none; }
    .pitch-num { font-size: 10px; color: var(--hint); margin-bottom: 3px; }
    .pitch-title { font-weight: 500; margin-bottom: 3px; }

    footer { margin-top: 2rem; font-size: 11px; color: var(--hint); text-align: center; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Analizador de Landing Pages</h1>
    <p>CRO · Mercado ecuatoriano · Puntuación 0–10</p>
  </header>

  <div class="input-row">
    <input class="url-input" id="urlInput" type="text" placeholder="empresa-ecuador.com" />
    <button class="btn" id="analyzeBtn" onclick="analyze()">Analizar →</button>
  </div>

  <div class="status" id="status"></div>

  <div class="report" id="report">

    <div class="score-block">
      <div class="score-big" id="scoreNum">—</div>
      <div class="score-meta">
        <div class="score-url" id="scoreUrl"></div>
        <div class="verdict-badge" id="verdictBadge"></div>
        <div class="bar-wrap"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Desglose por criterio</div>
      <div id="criteriaList"></div>
    </div>

    <div class="card">
      <div class="card-title">Puntos críticos detectados</div>
      <div id="issuesList"></div>
    </div>

    <div class="card">
      <div class="card-title">Propuesta de mejora — pitch de venta</div>
      <div id="pitchList"></div>
    </div>

  </div>

  <footer>Construido para prospección de clientes en Ecuador</footer>

</div>

<script>
  function normalizeUrl(raw) {
    let url = raw.trim();
    if (!url) return null;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    try { new URL(url); return url; } catch(e) { return null; }
  }

  async function analyze() {
    const raw = document.getElementById('urlInput').value;
    const url = normalizeUrl(raw);

    if (!url) { setStatus('Ingresa una URL válida, ej: empresa.com.ec', false, true); return; }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    document.getElementById('report').classList.remove('visible');
    setStatus('Visitando y analizando la página...', true);

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      renderReport(url, data);
      setStatus('');
    } catch(err) {
      setStatus('Error: ' + err.message, false, true);
    }

    btn.disabled = false;
  }

  function renderReport(url, r) {
    const score = parseFloat(r.score) || 0;
    const pct = Math.round((score / 10) * 100);
    const tier = score >= 7 ? 'strong' : score >= 4 ? 'valid' : 'weak';

    document.getElementById('scoreNum').textContent = Number.isInteger(score) ? score : score.toFixed(1);
    document.getElementById('scoreNum').className = 'score-big ' + tier;
    document.getElementById('scoreUrl').textContent = url;
    document.getElementById('verdictBadge').textContent = r.verdict;
    document.getElementById('verdictBadge').className = 'verdict-badge ' + tier;
    document.getElementById('barFill').style.width = pct + '%';
    document.getElementById('barFill').className = 'bar-fill ' + tier;

    document.getElementById('criteriaList').innerHTML = (r.criteria || []).map(c => {
      const full = c.pts_earned >= c.pts_max;
      const zero = c.pts_earned === 0;
      const icon = full ? '✓' : zero ? '✗' : '◐';
      const color = full ? '#1a7a4a' : zero ? '#c0392b' : '#d4960a';
      return `<div class="cr-row"><div class="cr-icon" style="color:${color}">${icon}</div><div class="cr-text"><strong>${c.name}</strong> — ${c.note}</div><div class="cr-pts">${c.pts_earned}/${c.pts_max}</div></div>`;
    }).join('');

    document.getElementById('issuesList').innerHTML = (r.issues || []).map(i =>
      `<div class="issue-row"><div class="issue-dot"></div><div>${i}</div></div>`
    ).join('');

    document.getElementById('pitchList').innerHTML = (r.pitch || []).map((p, i) =>
      `<div class="pitch-row"><div class="pitch-num">ARGUMENTO ${i+1}</div><div class="pitch-title">${p.title}</div><div>${p.body}</div></div>`
    ).join('');

    document.getElementById('report').classList.add('visible');
  }

  function setStatus(msg, loading = false, isError = false) {
    const s = document.getElementById('status');
    s.className = 'status' + (isError ? ' error' : '');
    s.innerHTML = msg ? (loading ? `<div class="dot"></div>${msg}` : msg) : '';
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });
</script>
</body>
</html>
